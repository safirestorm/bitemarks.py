services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./restaurants.json:/app/restaurants.json
    env_file:
      - .env
    networks:
      - bitemarks-network

  streamlit:
    build: .
    command: streamlit run Home.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    networks:
      - bitemarks-network

networks:
  bitemarks-network:
    driver: bridge
